<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Shadow Clone Jutsu</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0a0a0a;
      color: white;
      font-family: 'Segoe UI', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    .screen {
      display: none;
      min-height: 100vh;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      position: relative;
      z-index: 1;
    }

    .screen.active {
      display: flex;
    }

    /* ---- Title screen ---- */
    #title-screen h1 {
      font-size: 3.5rem;
      background: linear-gradient(90deg, #ff7a00, #ffb347);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      margin-bottom: 0.5rem;
      letter-spacing: 2px;
    }

    #title-screen p {
      color: #999;
      margin-bottom: 2.5rem;
    }

    .glow-btn {
      background: #ff7a00;
      color: #0a0a0a;
      border: none;
      padding: 1rem 3rem;
      font-size: 1.1rem;
      font-weight: bold;
      border-radius: 50px;
      cursor: pointer;
      box-shadow: 0 0 20px rgba(255, 122, 0, 0.5);
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .glow-btn:hover {
      transform: scale(1.05);
      box-shadow: 0 0 30px rgba(255, 122, 0, 0.8);
    }

    /* ---- Instructions screen ---- */
    #instructions-screen {
      max-width: 900px;
    }

    .instructions-layout {
      display: flex;
      align-items: center;
      gap: 3rem;
      max-width: 900px;
    }

    .character-container {
      flex-shrink: 0;
      width: 200px;
      height: 340px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #ninja-silhouette {
      width: 100%;
      height: 100%;
      animation: idleFloat 3s ease-in-out infinite;
    }

    @keyframes idleFloat {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-12px); }
    }

    .cards-container {
      display: flex;
      flex-direction: column;
      max-width: 550px;
    }

    .jutsu-card {
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 16px;
      padding: 1.5rem;
      margin-bottom: 1rem;
      width: 100%;
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .jutsu-icon {
      font-size: 2rem;
      width: 60px;
      text-align: center;
    }

    .jutsu-info h3 {
      color: #ff7a00;
      margin-bottom: 0.25rem;
    }

    .jutsu-info p {
      color: #aaa;
      font-size: 0.9rem;
    }

    /* ---- Live screen ---- */
    #live-screen {
      position: relative;
    }

    .video-container {
      position: relative;
      width: 640px;
      height: 480px;
    }

    #live-screen video, #live-screen canvas {
      position: absolute;
      top: 0;
      left: 0;
      width: 640px;
      height: 480px;
    }

    #live-screen video { transform: scaleX(-1); }
    #live-screen canvas { transform: scaleX(-1); }

    #gesture-label {
      margin-top: 1rem;
      color: #ff7a00;
      font-size: 1.3rem;
      font-weight: bold;
      letter-spacing: 1px;
    }

    /* ---- Background layers ---- */
    #bg-video {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      object-fit: cover;
      z-index: -2;
      opacity: 0.35;
      filter: saturate(1.3) brightness(0.7);
    }

    #three-bg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      z-index: -1;
    }

    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: radial-gradient(circle at center, transparent 0%, #0a0a0a 90%);
      z-index: 0;
      pointer-events: none;
    }

    /* ---- Heading ---- */
    .page-heading {
      text-align: center;
      margin-bottom: 2rem;
    }

    .main-title {
      font-size: 4rem;
      font-weight: 900;
      letter-spacing: 6px;
      background: linear-gradient(180deg, #ffb347 0%, #ff7a00 60%, #d94f00 100%);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      text-shadow: 0 0 40px rgba(255, 122, 0, 0.4);
      font-family: 'Arial Black', sans-serif;
    }

    .subtitle {
      color: #ff9d4d;
      letter-spacing: 3px;
      font-size: 0.95rem;
      margin-top: 0.5rem;
      text-transform: uppercase;
    }
  </style>
</head>
<body>

  <!-- Background layers: rendered once, sit behind every screen via fixed positioning -->
  <video id="bg-video" autoplay muted loop playsinline>
    <source src="https://res.cloudinary.com/vxewtpec/video/upload/v1784199428/bg-video_wahc0d.mp4" type="video/mp4" />
  </video>
  <canvas id="three-bg"></canvas>

  <!-- Title screen -->
  <div id="title-screen" class="screen active">
    <h1>SHADOW CLONE JUTSU</h1>
    <p>Real hand-sign detection, powered by your webcam</p>
    <button class="glow-btn" id="start-btn">Begin</button>
  </div>

  <!-- Instructions screen: heading appears ONCE, here only -->
  <div id="instructions-screen" class="screen">
    <div class="page-heading">
      <h1 class="main-title">NARUTO WORLD</h1>
      <p class="subtitle">— Master the Art of Hand Seals —</p>
    </div>

    <div class="instructions-layout">
      <div class="character-container">
        <svg id="ninja-silhouette" viewBox="0 0 200 340" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <filter id="glow">
              <feGaussianBlur stdDeviation="3" result="blur" />
              <feMerge>
                <feMergeNode in="blur" />
                <feMergeNode in="SourceGraphic" />
              </feMerge>
            </filter>
          </defs>

          <g filter="url(#glow)">
            <!-- Headband strap -->
            <rect x="62" y="38" width="76" height="9" rx="4" fill="#1a1a1a" stroke="#ff7a00" stroke-width="1.5" />
            <circle cx="100" cy="42.5" r="3" fill="#ff7a00" />

            <!-- Head -->
            <circle cx="100" cy="55" r="26" fill="#0d0d0d" stroke="#ff7a00" stroke-width="2" />

            <!-- Neck -->
            <rect x="92" y="78" width="16" height="12" fill="#0d0d0d" stroke="#ff7a00" stroke-width="2" />

            <!-- Torso -->
            <path d="M 70 92 
                     Q 100 84 130 92 
                     L 136 190 
                     Q 100 202 64 190 
                     Z" 
                  fill="#0d0d0d" stroke="#ff7a00" stroke-width="2" />

            <!-- Scarf, flowing to the side -->
            <path d="M 128 96 Q 165 108 160 150 Q 156 180 172 205" 
                  fill="none" stroke="#ff7a00" stroke-width="5" stroke-linecap="round" opacity="0.65" />

            <!-- Arms, crossed in front for a seal -->
            <path d="M 72 105 Q 50 122 62 148 Q 78 158 96 152 L 96 138 Q 82 136 78 122 Z" 
                  fill="#0d0d0d" stroke="#ff7a00" stroke-width="2" />
            <path d="M 128 105 Q 150 122 138 148 Q 122 158 104 152 L 104 138 Q 118 136 122 122 Z" 
                  fill="#0d0d0d" stroke="#ff7a00" stroke-width="2" />

            <!-- Legs -->
            <path d="M 76 192 L 70 300 Q 70 308 78 308 L 88 308 L 94 200 Z" 
                  fill="#0d0d0d" stroke="#ff7a00" stroke-width="2" />
            <path d="M 124 192 L 130 300 Q 130 308 122 308 L 112 308 L 106 200 Z" 
                  fill="#0d0d0d" stroke="#ff7a00" stroke-width="2" />
          </g>
        </svg>
      </div>

      <div class="cards-container">
        <div class="jutsu-card">
          <div class="jutsu-icon">🖐️</div>
          <div class="jutsu-info">
            <h3>Tiger Seal — Shadow Clone</h3>
            <p>Hold up index and middle fingers, others curled. Summon duplicate clones of yourself.</p>
          </div>
        </div>
        <div class="jutsu-card">
          <div class="jutsu-icon">🌀</div>
          <div class="jutsu-info">
            <h3>Rasengan</h3>
            <p>Coming soon</p>
          </div>
        </div>
        <div class="jutsu-card">
          <div class="jutsu-icon">⚡</div>
          <div class="jutsu-info">
            <h3>Chidori</h3>
            <p>Coming soon</p>
          </div>
        </div>

        <button class="glow-btn" id="enter-btn" style="margin-top: 1.5rem;">Enter the Arena</button>
      </div>
    </div>
  </div>

  <!-- Live screen -->
  <div id="live-screen" class="screen">
    <div class="video-container">
      <video id="webcam" autoplay playsinline></video>
      <canvas id="output"></canvas>
    </div>
    <h2 id="gesture-label">Waiting...</h2>
  </div>

  <script type="module" src="/main.js"></script>
</body>
</html>
